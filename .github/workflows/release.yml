name: Build and upload release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl

      - name: Build
        run: cmake --build build --config Release

      - name: Rename artifact
        run: copy build\AutoClicker.exe AutoClicker-${{ github.ref_name }}.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: AutoClicker-${{ github.ref_name }}.exe
