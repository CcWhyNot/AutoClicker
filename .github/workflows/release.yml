name: Build and upload release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir dist
          copy build\AutoClicker.exe dist\AutoClicker.exe
          copy build\SDL2.dll dist\SDL2.dll

      - name: Zip artifact
        run: Compress-Archive -Path dist\* -DestinationPath AutoClicker-${{ github.ref_name }}-windows.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: AutoClicker-${{ github.ref_name }}-windows.zip
